name: release

# タグ push（v*）で macOS / Windows のバイナリをビルドし、GitHub Releases に添付する。
# 各 OS はそれぞれの runner 上でネイティブにビルドするため、クロスコンパイルの罠を避けられる。
# SQLite はピュア Go の modernc.org/sqlite を使うため cgo の C コンパイラ依存はない。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.artifact }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: ssh-gete-macos-universal
          - os: windows-latest
            platform: windows/amd64
            artifact: ssh-gete-windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean -trimpath

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent ssh-gete.app "../../${{ matrix.artifact }}.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/ssh-gete.exe -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
